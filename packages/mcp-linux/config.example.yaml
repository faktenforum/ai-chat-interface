# Server-wide config for mcp-linux.
#
# Activate: Copy to config.yaml, or set MCP_LINUX_CONFIG to this file's path.
# In Docker the image uses this file as default config.

administrators: [localdev@example.com]

# Optional named clone shortcuts: create_workspace(name: "<key>") without a git_url
# clones the mapped repo. Empty by default; the agent creates plain per-project
# workspaces (empty git repo) or clones an explicit git_url.
workspace_templates: {}
