version: 1.3.1
cache: true

interface:
  customWelcome: '$${LIBRECHAT_CUSTOM_WELCOME}'
  privacyPolicy:
    externalUrl: '$${LIBRECHAT_PRIVACY_POLICY_URL}'
    openNewTab: true
  termsOfService:
    externalUrl: '$${LIBRECHAT_TERMS_OF_SERVICE_URL}'
    openNewTab: true
    modalAcceptance: true
    modalTitle: 'Kleingedrucktes'
    modalContent: |
      # Terms of Use

      **Important note on AI-generated responses**
      All responses from this AI system should always be reviewed by humans. AI-generated content may contain errors and should not be used as the sole source for important decisions.

      **Data Processing and Hosting**
      We strive to host as many components as possible ourselves. Currently we still use external services such as OpenRouter, which means data is currently transferred to servers in the USA. Our goal is to fully switch to self-hosted or European services.
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  prompts: true
  bookmarks: true
  multiConvo: true
  agents: true
  peoplePicker:
    users: true
    groups: true
    roles: true
  marketplace:
    use: true
  fileCitations: true
  fileSearch: true
  search: true
  # Show the estimated USD cost per message in the UI (cost transparency for the balance system).
  # Also surfaces per-model pricing (tokenConfig / fetched) into the client token-config map.
  contextCost: true

memory:
  disabled: false
  personalize: true
  tokenLimit: 2000
  messageWindowSize: 5
  # Memory categories for journalism and fact-checking workflow
  # Restricts memory storage to these structured categories for better consistency
  validKeys:
    # User preferences and communication style
    - "preferences"
    # Work-related: role, organization, department, responsibilities
    - "work_info"
    # Personal information: name, location, contact preferences
    - "personal_info"
    # Current projects, research topics, ongoing investigations
    - "projects"
    # Fact-checking specific: methods, verification approaches, source preferences
    - "factcheck_info"
    # Research context: background info, historical context, related investigations
    - "research_context"
    # Preferred sources, verification methods, trusted outlets
    - "sources"
    # Output format preferences: article style, citation format, structure
    - "output_format"
    # Important deadlines, publication dates, milestones
    - "deadlines"
    # Expertise areas, specializations, domain knowledge
    - "expertise"
    # Final results, conclusions, verified facts from completed fact-checks
    - "results"
  agent:
    provider: "Scaleway"
    # European Open Source model optimized for Memory tasks with cost-effective function calling
    # mistral-small-3.2-24b-instruct-2506: Cost-effective (3-6x cheaper than 70B models), good function calling
    # Supports 128K context window, improved function calling in v3.2, European-hosted
    model: "mistral-small-3.2-24b-instruct-2506"
    instructions: |
      Store reusable info via validKeys: preferences, work_info, personal_info, projects, factcheck_info, research_context, sources, output_format, deadlines, expertise, results. NEVER: greetings, casual chat, trivial/obvious statements. PRIORITY: Explicit user requests ("Remember", "Store") → always store, even if minor. If only greetings/casual/no info AND no explicit request → END without tools. UPDATE: Check existing memories first. If match exists → UPDATE via `set_memory` (merge old+new). Only create new if no match. NEVER delete+recreate. Delete outdated/corrected promptly. Max 2000 tokens/value.
    model_parameters:
      # Low temperature (0.15) for precise, deterministic function calling decisions
      # Mistral Small 3.2 performs best with temp 0.15 for reliable structured output
      temperature: 0.15
      # top_p: 0.95 provides controlled sampling while maintaining flexibility
      # Optimal for Mistral models when paired with low temperature
      top_p: 0.95

endpoints:
  # Agents configuration
  agents:
    disableBuilder: false
    # Vision: WIP/experimental. Requires feat/vision in dev/librechat + dev/agents. Draft PRs: LibreChat #11501 (https://github.com/danny-avila/LibreChat/pull/11501), agents #48 (https://github.com/danny-avila/agents/pull/48). See docs/wip/README.md
    capabilities:
      - "execute_code"
      - "file_search"
      - "actions"
      - "artifacts"
      - "chain"
      - "context"
      - "ocr"
      - "tools"
      - "web_search"
      - "vision"   # WIP/experimental

  custom:
    - name: OpenRouter
      apiKey: "$${OPENROUTER_KEY}"
      baseURL: "$${OPENROUTER_BASE_URL}"
      models:
        # Premium models only - Fallback list if fetch fails or fetch is disabled
        # Focus on top-performance proprietary models for special use cases
        # Note: Open Source models should use Scaleway (Europe) for better privacy
        default: [
          "anthropic/claude-opus-4.8",        # Strongest coding/agent model (1M Context)
          "anthropic/claude-sonnet-4.6",      # Top proprietary model (Vision, 1M Context)
          "openai/gpt-5.5-pro",               # GPT-5.5 Pro (premium tier)
          "openai/gpt-5.5",                   # Newest GPT-5 flagship (Vision)
          "openai/gpt-5.4",                   # GPT-5.4 (Vision, cheaper than 5.5)
          "google/gemini-3.5-flash",          # Google Gemini 3.5 Flash (GA, Vision)
          "google/gemini-3.1-flash-lite",     # Gemini 3.1 Flash Lite (cheap, fast)
          "google/gemini-3.1-pro-preview",    # Google Gemini 3.1 Pro (Preview from Google)
          "deepseek/deepseek-v4-pro",         # DeepSeek V4 Pro (long context)
          "x-ai/grok-4.3",                    # xAI reasoning model (Vision)
          "moonshotai/kimi-k2.6",             # Cheap long-context reasoning (Vision)
          "mistralai/mistral-large-2512"      # European premium option (French)
        ]
        # fetch all models from the API. Prod also uses fetch: true now; the selector stays
        # curated via modelSpecs.addedEndpoints, and fetch lets OpenRouter feed live prices.
        fetch: true
      titleConvo: true
      summarize: true
      headers:
        HTTP-Referer: "$${OPENROUTER_SITE_URL}"
        X-Title: "$${OPENROUTER_APP_NAME}"

    - name: Scaleway
      apiKey: "$${SCALEWAY_API_KEY}"
      baseURL: "$${SCALEWAY_BASE_URL}"
      # Custom endpoints only support iconURL (no iconPath key). Use a path to a copied asset: put the SVG in packages/librechat-init/assets/ and set iconURL: "/images/<filename>.svg"
      iconURL: "/images/scaleway.svg"
      # Scaleway docs: "Meta models do not support parallel tool calls."
      # Affected: Llama 3.1 (8b, 70b), Llama 3.3 (70b). Without this → 400 single tool-calls error.
      # addParams has no per-model scope, so this applies endpoint-wide. Benign for the other
      # models (e.g. glm-5.2 runs a sequential one-tool-per-turn agent loop and isn't restricted by it).
      # See docs/LIBRECHAT_FEATURES.md#scaleway-parallel-tool-calls.
      addParams:
        parallel_tool_calls: false
      # Scaleway Chat Completions API does not support these params; strip to avoid errors.
      # See docs/LIBRECHAT_FEATURES.md#scaleway-unsupported-parameters.
      dropParams:
        - frequencyPenalty   # frequency_penalty not supported
        - n                  # multiple completions not supported
        - topLogprobs        # top_logprobs not supported
        - logitBias          # logit_bias not supported
        - user               # user identifier not supported
        - add_generation_prompt
        - addGenerationPrompt
      # BASE_URL construction: If SCALEWAY_PROJECT_ID is set, the initialization script
      # automatically constructs the BASE_URL as https://api.scaleway.ai/{project_id}/v1.
      # Otherwise, the default SCALEWAY_BASE_URL value is used.
      models:
        default: [
          "glm-5.2",                          # Chat (Reasoning/Code) - strongest open-weight, European
          "llama-3.3-70b-instruct",           # Chat - Generally Available
          "qwen3-235b-a22b-instruct-2507",    # Chat - Generally Available
          "qwen3.5-397b-a17b",                # Chat, Vision (frontier MoE) - Generally Available
          "qwen3.6-35b-a3b",                  # Chat, Vision (efficient MoE) - Generally Available
          "mistral-small-3.2-24b-instruct-2506", # Chat, Vision - Generally Available
          "devstral-2-123b-instruct-2512",    # Chat (Code) - Generally Available
          "gpt-oss-120b",                      # Chat - Generally Available
          "gemma-4-26b-a4b-it",               # Chat, Vision - Generally Available
          "qwen3-coder-30b-a3b-instruct",     # Chat (Code) - Generally Available
          "pixtral-12b-2409",                 # Chat, Vision - Generally Available
          "holo2-30b-a3b",                    # Chat, Vision (GUI analysis) - Generally Available
          "qwen3-embedding-8b",               # Embeddings - Generally Available
          "bge-multilingual-gemma2"           # Embeddings - Generally Available
        ]
        # fetch all models from the API. Prod also uses fetch: true now; the selector stays
        # curated via modelSpecs.addedEndpoints, and fetch lets OpenRouter feed live prices.
        fetch: true
      # Static prices for the balance system. Scaleway has NO price feed (its /models returns only
      # OpenAI-standard fields: id/object/created/owned_by), so prices cannot be fetched and must be
      # set here. tokenConfig is authoritative for billing and works alongside fetch: true.
      # Rates are USD per 1M tokens (LibreChat convention: 1,000,000 token credits = 1 USD).
      # Source: Scaleway model-as-a-service pricing (EUR), converted EUR->USD x1.08 (Jun 2026).
      # TODO verify against https://www.scaleway.com/en/pricing/model-as-a-service/ — the adversarial
      # price re-verification did not complete (session limit). Adjust the EUR->USD factor if needed.
      tokenConfig:
        llama-3.3-70b-instruct:              { prompt: 0.97, completion: 0.97, context: 100000 }
        qwen3-235b-a22b-instruct-2507:       { prompt: 0.81, completion: 2.43, context: 250000 }
        mistral-small-3.2-24b-instruct-2506: { prompt: 0.16, completion: 0.38, context: 128000 }
        devstral-2-123b-instruct-2512:       { prompt: 0.43, completion: 2.16, context: 200000 }
        gpt-oss-120b:                        { prompt: 0.16, completion: 0.65, context: 128000 }
        gemma-3-27b-it:                      { prompt: 0.27, completion: 0.54, context: 40000 }
        qwen3-coder-30b-a3b-instruct:        { prompt: 0.22, completion: 0.86, context: 128000 }
        pixtral-12b-2409:                    { prompt: 0.22, completion: 0.22, context: 128000 }
        holo2-30b-a3b:                       { prompt: 0.32, completion: 0.76, context: 22000 }
        voxtral-small-24b-2507:              { prompt: 0.16, completion: 0.38, context: 32000 }
        # Newer models, verified available on Scaleway serverless (Jun 2026). Same EUR->USD x1.08.
        gemma-4-26b-a4b-it:                  { prompt: 0.27, completion: 0.54, context: 256000 }
        qwen3.5-397b-a17b:                   { prompt: 0.65, completion: 3.89, context: 250000 }
        qwen3.6-35b-a3b:                     { prompt: 0.27, completion: 1.62, context: 256000 }
        mistral-medium-3.5-128b:             { prompt: 1.62, completion: 8.10, context: 256000 }
        glm-5.2:                             { prompt: 1.94, completion: 5.94, context: 262144 }
        qwen3-embedding-8b:                  { prompt: 0.11, completion: 0, context: 32000 }
        bge-multilingual-gemma2:             { prompt: 0.11, completion: 0, context: 8000 }
      titleConvo: true
      summarize: true
      headers:
        HTTP-Referer: "$${SCALEWAY_SITE_URL}"
        X-Title: "$${SCALEWAY_APP_NAME}"

# NOTE: The prose model analysis below is illustrative background and may lag reality.
# AUTHORITATIVE sources of truth: the actual model ids/params live in modelSpecs.list (below);
# billing prices live in the Scaleway endpoint `tokenConfig` (USD/1M) and in OpenRouter's live
# fetch. Do not trust per-model prices/slugs quoted in these comments — verify against those.
#
# Model Specs: Define default model for new users
# This prevents "My Agents" from being selected when users have no agents
# Note: Memory function uses a separate model (configured in memory.agent section)
# Chat models don't need Function Calling for Memory - Memory works independently
#
# ==========================================
# MODEL ANALYSIS AND GROUPING
# ==========================================
#
# GROUP 1: "Europe & Open Source" (Scaleway)
# ------------------------------------------
# All models in this group are:
# - Open Source (Apache-2.0, Llama Community, MIT, etc.)
# - Hosted in Europe (Scaleway Data Centers)
# - GDPR-compliant
# - Optimal for privacy-critical applications
#
# DETAILED MODEL ANALYSIS (Scaleway):
#
# CHAT MODELS (Text-only):
# -------------------------
# 1. llama-3.3-70b-instruct (Meta)
#    - Context: 100K, Output: 4K
#    - License: Llama 3.3 Community
#    - Use Case: General conversations, good balance
#    - Status: Generally Available, recommended by Scaleway
#
# 2. qwen3-235b-a22b-instruct-2507 (Qwen)
#    - Context: 250K (largest available context!), Output: 8K
#    - License: Apache-2.0
#    - Use Case: Very complex tasks, extremely long contexts
#    - Status: Generally Available
#
# 3. qwen3-coder-30b-a3b-instruct (Qwen)
#    - Context: 128K, Output: 8K
#    - License: Apache-2.0
#    - Use Case: Programming, code generation, code analysis
#    - Status: Generally Available
#
# 4. gpt-oss-120b (OpenAI Open Source)
#    - Context: 128K, Output: 8K
#    - License: Apache-2.0
#    - Use Case: Complex tasks, GPT-compatible API
#    - Status: Generally Available
#
# CHAT & VISION MODELS:
# ----------------------
# 5. mistral-small-3.2-24b-instruct-2506 (Mistral)
#    - Context: 128K, Output: 8K
#    - License: Apache-2.0
#    - Use Case: Cost-effective (3-6x cheaper than 70B), Vision, general tasks
#    - Status: Generally Available, RECOMMENDED by Scaleway as entry model
#    - Special feature: Best cost-benefit balance
#
# 6. pixtral-12b-2409 (Mistral)
#    - Context: 128K, Output: 4K
#    - License: Apache-2.0
#    - Use Case: Specialized in image understanding, images up to 32M pixels
#    - Status: Generally Available
#
# DEPRECATED MODELS (no longer use):
# - deepseek-r1-distill-llama-70b (EOL: Apr 16, 2026)
# - mistral-nemo-instruct-2407 (EOL: Apr 16, 2026)
# - llama-3.1-8b-instruct (EOL: Apr 16, 2026)
#
# GROUP 2: "Premium Models" (OpenRouter)
# ------------------------------------------
# These models are:
# - Top performance for special use cases
# - Closed Source (Anthropic, OpenAI, Google) or special access required
# - Hosted via OpenRouter (USA)
# - Only recommended for non-privacy-critical tasks
#
# DETAILED MODEL ANALYSIS (OpenRouter Premium):
#
# 1. claude-opus-4.8 (Anthropic) — NEW
#    - Context: 1M (largest context at Anthropic), Output: 128K
#    - License: Closed Source (Proprietary)
#    - Use Case: Coding, Agents, long workflows, complex refactors
#    - Vision: Yes
#    - Adaptive thinking: optional preset "effort" ("", "low", "medium", "high", "max")
#    - Pricing: $5/M input, $25/M output tokens
#    - Special feature: Strongest Anthropic model, optimized for agents and entire codebases
#
# 2. claude-sonnet-4.6 (Anthropic)
#    - Context: 1M, Output: 64K
#    - License: Closed Source (Proprietary)
#    - Use Case: Top performance for complex tasks, programming, reasoning
#    - Vision: Yes
#    - Pricing: $3/M input, $15/M output tokens
#    - Special feature: Excellent reasoning, very good code generation
#
# 3. openai/gpt-5.4 (OpenAI)
#    - Context: 1M, Output: 128K
#    - License: Closed Source (Proprietary)
#    - Use Case: Top performance, Dynamic Reasoning, complex problem solving
#    - Vision: Yes
#    - Pricing: $2.50/M input, $15/M output tokens
#    - Special feature: Latest GPT-5 series, strong coding and reasoning
#
# 4. google/gemini-3.1-flash-lite (Google)
#    - Context: Variable, Output: Variable
#    - License: Closed Source (Proprietary)
#    - Use Case: Fast and cost-effective, good quality
#    - Vision: Yes
#    - Special feature: Optimized for speed with good quality
#
# 5. mistralai/mistral-large-2411 (Mistral)
#    - Context: 256K, Output: 8K
#    - License: Closed Source (Proprietary)
#    - Use Case: Premium model, European company
#    - Special feature: French company, popular with European users
#
# 6. glm/glm-4.7 (Z.AI)
#    - Context: 200K, Output: 128K
#    - License: Closed Source (Proprietary)
#    - Use Case: Excellent logical thinking, complex reasoning tasks
#    - Special feature: Advanced language understanding
#
# Exception (Preview from vendor, not provider — included explicitly):
# - gemma-3-27b-it (Scaleway) — Google Gemma 3 27B
# - google/gemini-3-flash-preview, google/gemini-3.1-pro-preview (OpenRouter) — Google Gemini 3
#
# RECOMMENDATIONS BY USE CASE:
# ----------------------------------
# Privacy-critical → Scaleway Models (Europe, Open Source)
#   - General: mistral-small-3.2-24b (cost-effective, Vision)
#   - Complex: llama-3.3-70b or qwen3-235b
#   - Code: devstral-2-123b or qwen3-coder-30b
#   - Vision: pixtral-12b or mistral-small-3.2-24b
#
# Top performance needed → Premium Models (OpenRouter)
#   - Best Coding/Agents: claude-opus-4.8 (1M Context)
#   - Best Overall: claude-sonnet-4.6
#   - Largest Context: openai/gpt-5.4 (1M)
#   - Fast & Cheap: google/gemini-3.1-flash-lite
#   - European Premium: mistral-large-2411
#   - Reasoning: glm/glm-4.7
#
# ==========================================
modelSpecs:
  prioritize: false  # avoids API warning when default spec + interface.presets are both enabled
  list:
    # Assistants: agent specs; post-init patches preset.agent_id to real API id — restart API to apply. Assistant = default.
    - name: "assistant-agent"
      label: "Assistant"
      description: "General-purpose assistant – coding, Linux/shell, files, data analysis, documents, research and GitHub in one place."
      group: "Assistants"
      groupIcon: "/images/group-assistants.svg"
      order: 0
      default: true
      preset:
        endpoint: "agents"
        endpointType: "agents"
        agent_id: "shared-agent-assistant"

    - name: "agent-faktencheck"
      label: "Faktencheck Assistant"
      description: "Search and present German fact-checks from Faktenforum; verify claims and find existing checks"
      group: "Assistants"
      order: 2
      preset:
        endpoint: "agents"
        endpointType: "agents"
        agent_id: "shared-agent-faktencheck"

    - name: "agent-image-generation"
      label: "Image Generation Assistant"
      description: "Creates images from text descriptions using AI image generation"
      group: "Assistants"
      order: 3
      preset:
        endpoint: "agents"
        endpointType: "agents"
        agent_id: "shared-agent-image-generation"

    - name: "agent-travel-location"
      label: "Travel and Location Assistant"
      description: "Helps with travel planning, location search, route planning and combines geographic information with weather data"
      group: "Assistants"
      order: 4
      preset:
        endpoint: "agents"
        endpointType: "agents"
        agent_id: "shared-agent-travel-location"


    # ==========================================
    # Europe & Open Source (Scaleway) – alphabetical by label
    # ==========================================
    # All models: Open Source, Europe-hosted, GDPR-compliant
    # Token limits: Scaleway Generative APIs + Managed Inference model catalog (Oct 2025)
    - name: "scaleway-glm-5.2"
      label: "GLM 5.2"
      description: "Starkes Reasoning- und Coding-Modell (Z.AI, MoE). Eines der besten Open-Weight-Modelle, europäisch gehostet (Scaleway). 256K Context, 16K Output. Text und Code. Open Weights (Z.AI)."
      group: "Europa & Open Source"
      groupIcon: "/images/group-europa.svg"
      order: 0
      preset:
        endpoint: "Scaleway"
        endpointType: "custom"
        model: "glm-5.2"
        maxContextTokens: 262144
        maxOutputTokens: 16384

    - name: "scaleway-devstral-2-123b"
      label: "Devstral 2 123B"
      description: "Coding and agent model (Mistral). 200K Context, 8K Output. Ideal for code, tools and software agents. Modified MIT."
      group: "Europa & Open Source"
      # Bot icon (green-600 #059669): Open Source / automation; good contrast in light and dark
      groupIcon: "/images/group-europa.svg"
      order: 1
      preset:
        endpoint: "Scaleway"
        endpointType: "custom"
        model: "devstral-2-123b-instruct-2512"
        maxContextTokens: 200000
        maxOutputTokens: 16384

    - name: "scaleway-gemma-4-26b"
      label: "Gemma 4 26B"
      description: "Kompaktes Chat- und Vision-Modell (Google, MoE). 256K Context, 32K Output. Ablöser von Gemma 3 27B: gleicher Preis, deutlich größerer Kontext. Gemma License."
      group: "Europa & Open Source"
      order: 2
      vision: true
      preset:
        endpoint: "Scaleway"
        endpointType: "custom"
        model: "gemma-4-26b-a4b-it"
        maxContextTokens: 256000
        maxOutputTokens: 32768

    - name: "scaleway-gpt-oss-120b"
      label: "GPT-OSS 120B"
      description: "Large model for complex tasks. 128K Context, 8K Output. Apache-2.0 License."
      group: "Europa & Open Source"
      order: 3
      preset:
        endpoint: "Scaleway"
        endpointType: "custom"
        model: "gpt-oss-120b"
        maxContextTokens: 128000
        maxOutputTokens: 32768

    - name: "scaleway-holo2-30b"
      label: "Holo2 30B"
      description: "Chat and vision model focused on GUI analysis (browser, software interfaces). 22K Context, 8K Output. CC-BY-NC-4.0; usage via Scaleway allowed. For testing UI/UX understanding."
      group: "Europa & Open Source"
      order: 4
      vision: true
      preset:
        endpoint: "Scaleway"
        endpointType: "custom"
        model: "holo2-30b-a3b"
        maxContextTokens: 22000
        maxOutputTokens: 8192

    - name: "scaleway-llama-3.3-70b"
      label: "Llama 3.3 70B"
      description: "Meta's latest model. 100K Context, 4K Output. Very good for general conversations and tasks. Llama 3.3 Community License. Recommended by Scaleway."
      group: "Europa & Open Source"
      order: 5
      preset:
        endpoint: "Scaleway"
        endpointType: "custom"
        model: "llama-3.3-70b-instruct"
        maxContextTokens: 100000   # Generative APIs; Managed Inference up to 128k (instance-dependent)
        maxOutputTokens: 16384

    - name: "scaleway-mistral-small-3.2"
      label: "Mistral Small 3.2 24B"
      description: "Kosteneffektiv (3-6x günstiger als 70B Modelle). 128K Context, 8K Output. Unterstützt Chat und Vision. Apache-2.0 License. Empfohlen von Scaleway als Einstiegsmodell."
      group: "Europa & Open Source"
      order: 6
      vision: true
      preset:
        endpoint: "Scaleway"
        endpointType: "custom"
        model: "mistral-small-3.2-24b-instruct-2506"
        maxContextTokens: 128000
        maxOutputTokens: 32768

    - name: "scaleway-pixtral-12b"
      label: "Pixtral 12B"
      description: "Spezialisiert auf Bildverständnis und Chat. 128K Context, 4K Output. Unterstützt Bilder bis 32M Pixel. Apache-2.0 License."
      group: "Europa & Open Source"
      order: 7
      vision: true
      preset:
        endpoint: "Scaleway"
        endpointType: "custom"
        model: "pixtral-12b-2409"
        maxContextTokens: 128000
        maxOutputTokens: 4096

    - name: "scaleway-qwen3-235b"
      label: "Qwen3 235B"
      description: "Sehr großes Modell (235B Parameter). 250K Context, 8K Output. Optimal für komplexe Aufgaben und lange Kontexte. Apache-2.0 License."
      group: "Europa & Open Source"
      order: 8
      preset:
        endpoint: "Scaleway"
        endpointType: "custom"
        model: "qwen3-235b-a22b-instruct-2507"
        maxContextTokens: 250000
        maxOutputTokens: 16384

    - name: "scaleway-qwen3-coder-30b"
      label: "Qwen3 Coder 30B"
      description: "Spezialisiert auf Programmierung und Code-Generierung. 128K Context, 8K Output. Apache-2.0 License."
      group: "Europa & Open Source"
      order: 9
      preset:
        endpoint: "Scaleway"
        endpointType: "custom"
        model: "qwen3-coder-30b-a3b-instruct"
        maxContextTokens: 128000
        maxOutputTokens: 32768

    - name: "scaleway-qwen3.5-397b"
      label: "Qwen3.5 397B"
      description: "Neues Frontier-Modell (Qwen, MoE 397B/17B aktiv). 250K Context, 16K Output. Text, Code und Vision. Stärkstes Scaleway-Modell. Apache-2.0 License."
      group: "Europa & Open Source"
      order: 11
