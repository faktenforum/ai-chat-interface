agents:
  # Universal assistant. Handles coding, Linux/shell, files, data, documents, research and
  # GitHub in one place. Replaces the former developer/workspace stack and both routers.
  - id: shared-agent-assistant
    name: Assistant
    description: General-purpose assistant – coding, Linux/shell, files, data analysis, documents, research and GitHub in one place.
    instructionsFile: shared-agent-assistant-instructions.md
    provider: Scaleway
    model: glm-5.2
    # No vision: glm-5.2 is text/code only. Image uploads fall back to OCR / "Upload as Text".
    model_parameters:
      temperature: 0.4
      top_p: 0.9
      maxContextTokens: 262144   # GLM 5.2 (Scaleway: 262144 context, 16384 output cap)
    tools:
      - web_search
      - file_search
    mcpServers:
      - linux
      - github
      - docs
      - stackoverflow
      - npm-search
      - wikipedia   # no explicit mcpTools -> all wikipedia tools enabled
    mcpTools:
      - execute_command_mcp_linux
      - read_terminal_output_mcp_linux
      - write_terminal_mcp_linux
      - list_terminals_mcp_linux
      - kill_terminal_mcp_linux
      - list_workspaces_mcp_linux
      - create_workspace_mcp_linux
      - delete_workspace_mcp_linux
      - get_workspaces_mcp_linux
      - get_status_mcp_linux
      - reset_account_mcp_linux
      - clean_workspace_uploads_mcp_linux
      - create_upload_session_mcp_linux
      - list_upload_sessions_mcp_linux
      - close_upload_session_mcp_linux
      - create_download_link_mcp_linux
      - list_download_links_mcp_linux
      - close_download_link_mcp_linux
      - read_workspace_file_mcp_linux
      - list_workspace_files_mcp_linux
      - write_mcp_linux
      - edit_mcp_linux
      - grep_mcp_linux
      - glob_mcp_linux
      - todowrite_mcp_linux
      - search_code_mcp_github
      - search_repositories_mcp_github
      - search_issues_mcp_github
      - search_pull_requests_mcp_github
      - search_users_mcp_github
      - get_file_contents_mcp_github
      - get_commit_mcp_github
      - get_latest_release_mcp_github
      - get_release_by_tag_mcp_github
      - get_label_mcp_github
      - get_me_mcp_github
      - issue_read_mcp_github
      - pull_request_read_mcp_github
      - list_commits_mcp_github
      - list_branches_mcp_github
      - list_tags_mcp_github
      - list_pull_requests_mcp_github
      - list_issues_mcp_github
      - list_releases_mcp_github
      - list_issue_types_mcp_github
      - create_issue_mcp_github
      - create_pull_request_mcp_github
      - create_review_mcp_github
      - pull_request_review_write_mcp_github
      - add_comment_to_pending_review_mcp_github
      - add_issue_comment_mcp_github
      - issue_write_mcp_github
      - update_pull_request_mcp_github
      - update_pull_request_branch_mcp_github
      - create_branch_mcp_github
      - merge_pull_request_mcp_github
      - create_or_update_file_mcp_github
      - delete_file_mcp_github
      - push_files_mcp_github
      - fork_repository_mcp_github
      - create_repository_mcp_github
      - assign_copilot_to_issue_mcp_github
      - request_copilot_review_mcp_github
      - sub_issue_write_mcp_github
      - scrape_docs_mcp_docs
      - search_docs_mcp_docs
      - list_libraries_mcp_docs
      - list_jobs_mcp_docs
      - get_job_info_mcp_docs
      - fetch_url_mcp_docs
      - refresh_version_mcp_docs
      - find_version_mcp_docs
      - remove_docs_mcp_docs
      - cancel_job_mcp_docs
      - search_by_error_mcp_stackoverflow
      - search_by_tags_mcp_stackoverflow
      - analyze_stack_trace_mcp_stackoverflow
      - search_npm_packages_mcp_npm-search
    category: general
    conversation_starters:
      - What can you do?
      - Implement a feature or fix a bug in my project
      - Analyze this CSV file and create a chart
      - Create a professional PDF document
      - Convert this file to another format
      - Review a pull request or open an issue
      - Research a topic and summarize the findings
    # Single agent, long sessions, no router chain.
    recursion_limit: 150
    handoffs:
      - agent: shared-agent-faktencheck
        description: "Transfer to Faktencheck Assistant for German fact-checks, verifying claims, or finding existing checks in Faktenforum"
        prompt: "Summarize the claim or topic the user wants fact-checked"
      - agent: shared-agent-travel-location
        description: "Transfer to Travel and Location Assistant for route planning, maps, weather, POI search, or public transport"
        prompt: "Summarize the travel or location query: origin, destination, preferences, or area of interest"
      - agent: shared-agent-image-generation
        description: "Transfer to Image Generation Assistant for creating AI-generated images from text descriptions"
        prompt: "Describe the image: subject, style, mood, colors, and any specific requirements"
    isCollaborative: true
    permissions:
      public: true
      publicEdit: true

  - id: shared-agent-faktencheck
    name: Faktencheck Assistant
    description: Search and present German fact-checks from Faktenforum; verify claims and find existing checks
    instructionsFile: shared-agent-faktencheck-instructions.md
    provider: Scaleway
    model: mistral-small-3.2-24b-instruct-2506
    model_parameters:
      temperature: 0.4
      top_p: 0.9
      maxContextTokens: 128000   # Mistral Small 3.2 24B; Scaleway has no endpointTokenConfig
    tools: []
    mcpServers:
      - search
    mcpTools:
      - search_factchecks_mcp_search
      - get_factcheck_mcp_search
      - list_categories_mcp_search
    category: general
    conversation_starters:
      - Gibt es einen Faktencheck zu diesem Thema?
      - Suche nach Fact-Checks zu Impfungen
      - Welche Kategorien von Faktenchecks gibt es?
      - Zeig mir die Details zu einem bestimmten Faktencheck
    handoffs:
      - agent: shared-agent-assistant
        description: "Return to the Assistant when the request is outside fact-checking (e.g. general research, coding, documents). Do not hand back merely because the request is ambiguous; ask one short clarifying question or handle it within your role."
    recursion_limit: 25
    isCollaborative: false # Not yet public
    permissions:
      public: false # Not yet public
      publicEdit: false # Not yet public

  - id: shared-agent-image-generation
    name: Image Generation Assistant
    description: Creates images from text descriptions using AI image generation
    instructionsFile: shared-agent-image-generation-instructions.md
    provider: Scaleway
    model: mistral-small-3.2-24b-instruct-2506
    model_parameters:
      temperature: 0.7
      top_p: 0.9
      maxContextTokens: 128000   # Mistral Small 3.2 24B; Scaleway has no endpointTokenConfig
    tools: []
    mcpServers:
      - image-gen
    mcpTools:
      - generate_image_mcp_image-gen
      - list_models_mcp_image-gen
      - check_model_mcp_image-gen
    category: creative
    conversation_starters:
      - Create an image of a mountain landscape at sunset
      - Show me different styles for portraits
      - Generate an abstract artwork
      - Create an image of a café in Paris
    handoffs:
      - agent: shared-agent-assistant
        description: "Return to the Assistant when the request is outside image generation. Do not hand back merely because the request is ambiguous; ask one short clarifying question or handle it within your role."
    recursion_limit: 25
    isCollaborative: true
    permissions:
      public: true
      publicEdit: true

  - id: shared-agent-travel-location
    name: Travel and Location Assistant
    description: Helps with travel planning, location search, route planning and combines geographic information with weather data
    instructionsFile: shared-agent-travel-location-instructions.md
    provider: Scaleway
    model: qwen3-235b-a22b-instruct-2507
    model_parameters:
      temperature: 0.7
      top_p: 0.8
      maxContextTokens: 250000   # Qwen3 235B; Scaleway has no endpointTokenConfig
    tools: []
    mcpServers:
      - mapbox
      - openstreetmap
      - weather
      - db-timetable
    mcpTools:
      - search_and_geocode_tool_mcp_mapbox
      - reverse_geocode_tool_mcp_mapbox
      - directions_tool_mcp_mapbox
      - category_search_tool_mcp_mapbox
      - static_map_image_tool_mcp_mapbox
      - matrix_tool_mcp_mapbox
      - optimization_tool_mcp_mapbox
      - isochrone_tool_mcp_mapbox
      - map_matching_tool_mcp_mapbox
      - resource_reader_tool_mcp_mapbox
      - distance_tool_mcp_mapbox
      - bearing_tool_mcp_mapbox
      - midpoint_tool_mcp_mapbox
      - suggest_meeting_point_mcp_openstreetmap
      - explore_area_mcp_openstreetmap
      - find_schools_nearby_mcp_openstreetmap
      - analyze_commute_mcp_openstreetmap
      - find_ev_charging_stations_mcp_openstreetmap
      - analyze_neighborhood_mcp_openstreetmap
      - find_parking_facilities_mcp_openstreetmap
      - get_current_weather_mcp_weather
      - get_weather_byDateTimeRange_mcp_weather
      - get_weather_details_mcp_weather
      - get_air_quality_mcp_weather
      - get_air_quality_details_mcp_weather
      - get_current_datetime_mcp_weather
      - get_timezone_info_mcp_weather
      - convert_time_mcp_weather
      - getCurrentTimetable_mcp_db-timetable
      - getRecentChanges_mcp_db-timetable
      - getPlannedTimetable_mcp_db-timetable
      - findStations_mcp_db-timetable
    category: productivity
    conversation_starters:
      - Find the best route from Berlin to Munich
      - Show me restaurants near Berlin Central Station
      - Analyze the neighborhood around Alexanderplatz
      - Find a meeting point for three people in Berlin
      - Create a map with the route from Hamburg to Bremen
      - What will the weather be like tomorrow in Munich?
    handoffs:
      - agent: shared-agent-assistant
        description: "Return to the Assistant when the request is outside travel and location (e.g. coding, documents, research). Do not hand back merely because the request is ambiguous; ask one short clarifying question or handle it within your role."
    recursion_limit: 40
    isCollaborative: true
    permissions:
      public: true
      publicEdit: true
