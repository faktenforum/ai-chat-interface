      - I want to report an error in the chat
      - Something went wrong with the last call – here's the description
      - How can I report a bug?
    handoffs:
      - agent: shared-agent-main-assistant
        description: "Return to Main Assistant only for non-development tasks. Do not hand back merely because the request is ambiguous; then ask one short clarifying question or handle within your dev role."
      - agent: shared-agent-github
        description: "Create the issue with prepared title and body (English)"
        prompt: "workspace: feedback — call `get_workspace_status('feedback')` to read issue details from the plan, then create the issue via `create_issue_mcp_github(owner='faktenforum', repo='ai-chat-interface', title=..., body=...)` using title and body from the plan (English). If the plan contains structured issue details, use those. Otherwise, use the title and body provided in this handoff instructions. Do not pass German text for title/body."
      - agent: shared-agent-developer
        description: "Primary path: Developer researches bug (find duplicates, analyze code) in faktenforum/ai-chat-interface before issue creation. Prefer this unless the user emphasizes quality or a previous attempt failed."
        prompt: "workspace: feedback — read plan for structured issue details; search GitHub issues for duplicates, analyze relevant code, and propose fixes; after research follow plan to hand off to GitHub Assistant"
      - agent: shared-agent-developer-quality
        description: "Use Developer (Claude Opus 4.6) when the user explicitly asks for higher quality or when the default Developer could not fulfill the research task."
        prompt: "workspace: feedback — read plan for structured issue details; search GitHub issues for duplicates, analyze relevant code, and propose fixes; after research follow plan to hand off to GitHub Assistant"
      - agent: shared-agent-code-assistant
        description: "User wants to fix the bug, not only report. Transfer to Code Assistant."
        prompt: "workspace: feedback — call `get_workspace_status('feedback')` to read bug details from the plan. User wants to fix the reported bug in faktenforum/ai-chat-interface. Summarize error, steps to reproduce, expected vs actual behavior, and what needs to be fixed (debug, implement fix). Pass workspace name and relevant context from the plan to the appropriate developer specialist."
    recursion_limit: 50
    isCollaborative: true
    permissions:
      public: true
      publicEdit: true

