agents:
  - id: shared-agent-recherche
    name: Recherche-Assistent
    description: Hilft bei der Recherche und Informationsbeschaffung aus verschiedenen Quellen
    instructionsFile: shared-agent-recherche-instructions.md
    provider: Scaleway
    model: mistral-small-3.2-24b-instruct-2506
    model_parameters:
      temperature: 0.5
      top_p: 0.9
      maxContextTokens: 128000   # Mistral Small 3.2 24B; Scaleway has no endpointTokenConfig
    tools:
      - web_search
      - file_search
    mcpServers: []
    category: general
    conversation_starters:
      - Recherchiere aktuelle Informationen zum Klimawandel
      - Suche nach Studien zu erneuerbaren Energien
      - Vergleiche Berichterstattung verschiedener Quellen zu einem aktuellen Thema
      - Recherchiere die neuesten Entwicklungen bei Solarstrom
    handoffs:
      - agent: shared-agent-universal
        description: "Return to Universal only when: the user explicitly asks for a different assistant, or your task is complete and they want something else, or the request is clearly outside your domain. Do not hand back merely because the request is ambiguous; then ask one short clarifying question or do a reasonable interpretation within your role."
      - agent: shared-agent-datenanalyse
        description: "Transfer to data analyst for statistical analysis, charts, or visualization of collected data"
        prompt: "Summarize the research findings and describe what data analysis or visualization is needed"
      - agent: shared-agent-dokumenten-ersteller
        description: "Transfer to document creator for a professional report, summary, or PDF from research results"
        prompt: "Summarize the research findings and describe what kind of document should be created"
    recursion_limit: 50
    isCollaborative: true
    permissions:
      public: true
      publicEdit: true
