  # Developer domain: router + specialists. See docs/DEVELOPER_AGENTS.md.

  - id: shared-agent-developer-router
    name: Entwickler-Router
    description: Leitet Entwickler-Anfragen an den passenden Spezialisten weiter – Code-Recherche, Implementierung, Refactoring, GitHub, Code-Review.
    instructionsFile: shared-agent-developer-router-instructions.md
    provider: Scaleway
    model: devstral-2-123b-instruct-2512
    model_parameters:
      temperature: 0.3
      top_p: 0.9
      maxContextTokens: 200000   # Devstral 2 123B; Scaleway has no endpointTokenConfig
    tools: []
    mcpServers:
      - linux
    mcpTools:
      - list_workspaces_mcp_linux
      - get_workspace_status_mcp_linux
      - set_workspace_plan_mcp_linux
    category: development
    conversation_starters:
      - Ich brauche Hilfe bei einem Entwicklungsprojekt
      - Welcher Entwickler-Assistent passt zu meiner Aufgabe?
      - Ich möchte einen PR reviewen lassen
      - Hilf mir beim Debugging
    handoffs:
      - agent: shared-agent-code-researcher
        description: "Transfer to Code-Recherche (default, OpenSource). Prefer this unless the user emphasizes quality or a previous attempt with the default failed."
        prompt: "Describe the code research task: what needs to be understood, which repo/library, or what error/question needs investigation"
      - agent: shared-agent-code-researcher-quality
        description: "Transfer to Code-Recherche (Claude Opus 4.6) when the user explicitly asks for higher quality or when the default Code-Recherche could not fulfill the task."
        prompt: "Describe the code research task: what needs to be understood, which repo/library, or what error/question needs investigation"
      - agent: shared-agent-developer
        description: "Transfer to Entwickler (default, OpenSource). Prefer this unless the user emphasizes quality or a previous attempt with the default failed."
        prompt: "Describe what needs to be implemented or fixed, including repo URLs, language/framework, and requirements"
      - agent: shared-agent-developer-quality
        description: "Transfer to Entwickler (Claude Opus 4.6) when the user explicitly asks for higher quality or when the default Entwickler could not fulfill the task."
        prompt: "Describe what needs to be implemented or fixed, including repo URLs, language/framework, and requirements"
      - agent: shared-agent-code-refactorer
        description: "Transfer to Code-Refactorer (default, OpenSource). Prefer this unless the user emphasizes quality or a previous attempt with the default failed."
        prompt: "Describe what code needs refactoring, the goals (readability, performance, structure), and the workspace/repo context"
      - agent: shared-agent-code-refactorer-quality
        description: "Transfer to Code-Refactorer (Gemini 3 Pro Preview) when the user explicitly asks for higher quality or when the default Code-Refactorer could not fulfill the task."
        prompt: "Describe what code needs refactoring, the goals (readability, performance, structure), and the workspace/repo context"
      - agent: shared-agent-github
        description: "Transfer to GitHub assistant for PR creation, issue management, reviews posting, and repo operations"
        prompt: "Describe the GitHub task: repo, PR/issue number, what action is needed"
      - agent: shared-agent-code-reviewer
        description: "Transfer to Code-Reviewer (default, OpenSource). Prefer this unless the user emphasizes quality or a previous attempt with the default failed."
        prompt: "Provide the PR URL and any specific review focus areas"
      - agent: shared-agent-code-reviewer-quality
        description: "Transfer to Code-Reviewer (Gemini 3 Pro Preview) when the user explicitly asks for higher quality or when the default Code-Reviewer could not fulfill the task."
        prompt: "Provide the PR URL and any specific review focus areas"
      - agent: shared-agent-universal
        description: "Return to Universal only for non-development tasks. Do not hand back merely because the request is ambiguous; then ask one short clarifying question or handle within your dev role."
    # Router→specialist + many tool steps; limit from first agent applies to whole run
    recursion_limit: 120
    isCollaborative: true
    permissions:
      public: true
      publicEdit: true

