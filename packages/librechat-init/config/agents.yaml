agents:
  - id: shared-agent-research
    name: Research Assistant
    description: Helps with research and information gathering from various sources
    instructionsFile: shared-agent-research-instructions.md
    provider: Scaleway
    model: mistral-small-3.2-24b-instruct-2506
    model_parameters:
      temperature: 0.5
      top_p: 0.9
      maxContextTokens: 128000   # Mistral Small 3.2 24B; Scaleway has no endpointTokenConfig
    tools:
      - web_search
      - file_search
    mcpServers:
      - checkbot-rag
    category: general
    conversation_starters:
      - Research current information on climate change
      - Search for studies on renewable energy
      - Compare reporting from different sources on a current topic
      - Research the latest developments in solar power
    handoffs:
      - agent: shared-agent-main-assistant
        description: "Return to Main Assistant only when: the user explicitly asks for a different assistant, or your task is complete and they want something else, or the request is clearly outside your domain. Do not hand back merely because the request is ambiguous; then ask one short clarifying question or do a reasonable interpretation within your role."
      - agent: shared-agent-data-analysis
        description: "Transfer to data analyst for statistical analysis, charts, or visualization of collected data"
        prompt: "Summarize the research findings and describe what data analysis or visualization is needed"
      - agent: shared-agent-document-creator
        description: "Transfer to document creator for a professional report, summary, or PDF from research results"
        prompt: "Summarize the research findings and describe what kind of document should be created"
    recursion_limit: 50
    isCollaborative: true
    permissions:
      public: true
      publicEdit: true
  - id: shared-agent-faktencheck
    name: Faktencheck Assistant
    description: Search and present German fact-checks from Faktenforum; verify claims and find existing checks
    instructionsFile: shared-agent-faktencheck-instructions.md
    provider: Scaleway
    model: mistral-small-3.2-24b-instruct-2506
    model_parameters:
      temperature: 0.4
      top_p: 0.9
      maxContextTokens: 128000   # Mistral Small 3.2 24B; Scaleway has no endpointTokenConfig
    tools: []
    mcpServers:
      - checkbot-rag
    mcpTools:
      - search_factchecks_mcp_checkbot-rag
      - get_factcheck_mcp_checkbot-rag
      - list_categories_mcp_checkbot-rag
    category: general
    conversation_starters:
      - Gibt es einen Faktencheck zu diesem Thema?
      - Suche nach Fact-Checks zu Impfungen
      - Welche Kategorien von Faktenchecks gibt es?
      - Zeig mir die Details zu einem bestimmten Faktencheck
    handoffs:
      - agent: shared-agent-main-assistant
        description: "Return to Main Assistant only when: the user explicitly asks for a different assistant, or your task is complete and they want something else, or the request is clearly outside your domain (e.g. general research without fact-checks). Do not hand back merely because the request is ambiguous; then ask one short clarifying question or do a reasonable interpretation within your role."
      - agent: shared-agent-research
        description: "Transfer to Research Assistant for broader research, web search, or when fact-check search is insufficient"
        prompt: "Summarize what was found via fact-checks and what additional research is needed"
    recursion_limit: 25
    isCollaborative: false # Not yet public
    permissions:
      public: false # Not yet public
      publicEdit: false # Not yet public
  - id: shared-agent-image-generation
    name: Image Generation Assistant
    description: Creates images from text descriptions using AI image generation
    instructionsFile: shared-agent-image-generation-instructions.md
    provider: Scaleway
    model: mistral-small-3.2-24b-instruct-2506
    model_parameters:
      temperature: 0.7
      top_p: 0.9
      maxContextTokens: 128000   # Mistral Small 3.2 24B; Scaleway has no endpointTokenConfig
    tools: []
    mcpServers:
      - image-gen
    mcpTools:
      - generate_image_mcp_image-gen
      - list_models_mcp_image-gen
      - check_model_mcp_image-gen
    category: creative
    conversation_starters:
      - Create an image of a mountain landscape at sunset
      - Show me different styles for portraits
      - Generate an abstract artwork
      - Create an image of a café in Paris
    handoffs:
      - agent: shared-agent-main-assistant
        description: "Return to Main Assistant only when: the user explicitly asks for a different assistant, or your task is complete and they want something else, or the request is clearly outside your domain. Do not hand back merely because the request is ambiguous; then ask one short clarifying question or do a reasonable interpretation within your role."
    recursion_limit: 25
    isCollaborative: true
    permissions:
