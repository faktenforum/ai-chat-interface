# Shared prompt templates for LibreChat.
# Each entry creates a reusable prompt group accessible via the Prompts panel or slash commands.
# Private prompts (e.g. with API keys in the text) go in prompts.private.yaml (git-ignored).
#
# Fields:
#   name     (required) - Display name in the prompt list
#   prompt   (required) - The prompt text (supports {{variables}} like {{current_date}}, {{current_user}})
#   type     (optional) - "text" (default) or "chat"
#   category (optional) - Category value for filtering (use exact value: idea, travel, teach_or_explain, write, shop, code, misc, roleplay, finance)
#   oneliner (optional) - Short description shown in the prompt list
#   command  (optional) - Slash command trigger (lowercase a-z, 0-9, hyphens only)
#   sharing  (optional) - Sharing and permission settings:
#     users   - List of user permissions (by email or name)
#     groups  - List of group permissions (by name)
#     public  - Public sharing settings (enabled: true/false, defaultRole: viewer/editor/owner)

prompts:
  - name: Review GitHub Pull Request
    prompt: Bitte Review {{Github Pull Request URL}} und veröffentliche diesen als Kommentar im PR.
    command: review-github-pr
    category: code
    oneliner: Reviewt einen GitHub Pull Request und veröffentlicht das Ergebnis als Kommentar im PR.
    sharing:
      public:
        enabled: true
        defaultRole: editor
  - name: Überarbeite GitHub PR
    prompt: |
      Bearbeite den GitHub Pull Request {{Github Pull Request URL}} vollständig.

      ## Ablauf

      1. **Review**: Analysiere den PR (Code, Tests, Docs). Identifiziere Verbesserungspunkte.
      2. **Refactor-Plan**: Erstelle eine priorisierte Liste der Änderungen.
      3. **Workspace**: Falls ein Linux-Workspace für diesen PR existiert – prüfe ob er aktuell und wiederverwendbar ist; sonst zurücksetzen und neu anlegen.
      4. **Umsetzung**: Delegiere jede Aufgabe an den passenden Experten (z.B. Code-Refactorer, Code-Reviewer). Jeder Experte erledigt seinen Task und übergibt an den nächsten, bis alle Punkte abgearbeitet sind.
      5. **Abschluss**: Pushe die Änderungen auf den PR-Branch. Hinterlasse einen PR-Kommentar mit Zusammenfassung des Reviews und der vorgenommenen Verbesserungen.

      ## Regeln
      - Delegiere gezielt an Experten; keine parallelen Aufgaben ohne Abhängigkeiten.
      - Halte den Plan überschaubar; priorisiere die wichtigsten Verbesserungen zuerst.
      - Der finale PR-Kommentar muss Review-Ergebnis und Änderungsliste klar dokumentieren.
    command: ueberarbeite-github-pr
    category: code
    oneliner: Reviewt einen GitHub PR, setzt Verbesserungen um und pusht sie auf den Branch.
    sharing:
      public:
        enabled: true
        defaultRole: editor
  - name: Routenplan
    prompt: Erstelle einen Routenplan von {{Start}} nach {{Ziel}} mit {{Verkehrsmittel:dem Auto|dem Zug|zu Fuß|dem Fahrrad|dem ÖPNV}}.
    command: routenplan
    category: travel
    oneliner: Erstellt einen Routenplan zwischen zwei Orten mit verschiedenen Verkehrsmitteln (Auto, Zug, zu Fuß, Fahrrad, ÖPNV).
    sharing:
      public:
        enabled: true
        defaultRole: editor
  - name: Wetter
    prompt: Wie wird das Wetter {{wann:heute|morgen|die nächsten 3 Tage}} in {{Stadt}}?
    command: wetter
    category: travel
    oneliner: Ermittelt die Wettervorhersage für eine Stadt und einen Zeitraum.
    sharing:
      public:
        enabled: true
        defaultRole: editor
  - name: Rezept zum Wetter
    prompt: Schlage mir ein Rezept vor welches zum aktuellen Wetter in {{Stadt}} passt, schaue dazu zuerst vereinfacht nach dem Wetter und suche dann nach einem passenden Rezept. Verwende die Kochhilfe und nicht den Reise- und Standort-Assistenten, falls du an diese übergeben kannst.
    command: rezept-wetter
    category: misc
    oneliner: Schlägt ein zum aktuellen Wetter in einer Stadt passendes Rezept vor (Kochhilfe).
    sharing:
      public:
        enabled: true
        defaultRole: editor
  - name: Feedback-Problem melden
    prompt: |
      Analysiere das aufgetretene Problem im Chat-Interface und gib die relevanten Informationen an den Feedback-Assistenten weiter. Der Feedback-Assistent legt automatisch ein GitHub-Issue im Projekt-Repository an mit: ursprüngliche Aufgabe, aufgetretene Probleme und mögliche Optimierungen – damit der Agent beim nächsten Mal einen runderen Durchlauf hat.

      **Vorgehen**: Erschließe alle Angaben ausschließlich aus dem Chat-Verlauf (keine Websuche). Stelle dem Nutzer nur Fragen, falls etwas unklar bleibt.

      **Wichtige Angaben**: Agent (Name/ID), ursprüngliche Aufgabe, wo es Probleme gab, was wiederholt schief lief, was optimiert werden könnte.

      **Regeln**: Sachlich und spezifisch. Nur Kontext dieser Konversation. Alle Informationen vollständig weitergeben.
    command: feedback-problem
    category: misc
    oneliner: Meldet ein Problem mit dem Chat-Interface (Agent-Verhalten, Tool-Aufrufe, etc.) als GitHub-Issue im Projekt-Repository, damit es behoben werden kann.
    sharing:
      public:
        enabled: true
        defaultRole: editor
