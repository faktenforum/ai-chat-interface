services:
  # Infrastructure Services
  traefik:
    extends: { file: docker-compose.traefik.yml, service: traefik }
    env_file: .env.local
    # Lets the SELinux-confined container read the runtime socket under rootless Podman
    # (no-op under Docker). CONTAINER_SOCKET selects the docker vs podman socket.
    security_opt:
      - label=disable

  maildev:
    container_name: maildev
    image: maildev/maildev:latest
    restart: always
    networks:
      - app-net
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=ai-chat-interface_traefik-net"
      - "traefik.http.routers.maildev.rule=Host(`maildev.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.maildev.entrypoints=web"
      - "traefik.http.services.maildev.loadbalancer.server.port=1080"

  # Database Services - MongoDB
  mongodb-init:
    extends: { file: docker-compose.librechat.yml, service: mongodb-init }
    container_name: ${STACK_NAME:-local}-mongodb-init
    env_file: .env.local
    volumes:
      - mongodata:/data/db
      - mongoconfig:/data/configdb

  mongodb:
    extends: { file: docker-compose.librechat.yml, service: mongodb }
    container_name: ${STACK_NAME:-local}-mongodb
    env_file: .env.local
    # Under rootless Podman the chown-init can't align the named volume to uid 1000, so
    # the volume keeps the mongo image's default uid (999). MONGODB_USER=999:999 (set by
    # the podman npm scripts) matches it. Defaults to 1000:1000 under Docker (unchanged).
    user: "${MONGODB_USER:-1000:1000}"
    # SELinux: named volume lives under $HOME (user_home_t); a confined container can't write
    # to it under rootless Podman -> mongod fails creating /data/db/journal. Mirrors meilisearch.
    security_opt:
      - label=disable
    volumes:
      - mongodata:/data/db
      - mongoconfig:/data/configdb
    ports:
      # Expose MongoDB port for local development (Cursor MCP integration)
      # Only accessible from localhost, not exposed to external networks
      - "127.0.0.1:27017:27017"

  # LibreChat Services
  librechat-init:
    extends: { file: docker-compose.librechat.yml, service: librechat-init }
    container_name: ${STACK_NAME:-local}-librechat-init
    env_file: .env.local
    # SELinux: host mounts + $HOME-based named volumes are user_home_t; confined containers
    # can't access them under rootless Podman. Mirrors meilisearch/mongodb (no-op under Docker).
    security_opt:
      - label=disable
    environment:
      LIBRECHAT_ENV: local
      STACK_NAME: ${STACK_NAME:-local}
    # Mount host config so changes to librechat.yaml/roles/agents apply without image rebuild.
    # Init reads from /app/config-source when present and writes to volume /app/config.
    volumes:
      - librechat-config:/app/config
      - ./packages/librechat-init/config:/app/config-source:ro
      - ./logs:/logs
      - ./images:/images
      - ./uploads:/uploads
      - mongodata:/mongo_data
      - ./meili_data_v1.12:/meili_data
      - mongoconfig:/mongo_configdb

  librechat-post-init:
    extends: { file: docker-compose.librechat.yml, service: librechat-post-init }
    container_name: ${STACK_NAME:-local}-librechat-post-init
    env_file: .env.local
    security_opt:
      - label=disable
    # Mount host config so agent/prompt changes apply without image rebuild; post-init reads from /app/config-source when present.
    volumes:
      - librechat-config:/app/config
      - ./packages/librechat-init/config:/app/config-source:ro
      - mongodata:/mongo_data
      - mongoconfig:/mongo_configdb

  meilisearch:
    extends: { file: docker-compose.librechat.yml, service: meilisearch }
    container_name: ${STACK_NAME:-local}-meilisearch
    env_file: .env.local
    # SELinux relabel workaround for the bind-mounted meili_data dir under rootless Podman
    # (no-op under Docker).
    security_opt:
      - label=disable

  api:
    extends: { file: docker-compose.librechat.yml, service: api }
    container_name: ${STACK_NAME:-local}-librechat
    # Build from submodule Dockerfile (like rag_api)
    # Use unique image name to prevent Docker layering built image on base image
    image: librechat:local
    pull_policy: never
    build:
      context: ./dev/librechat
      dockerfile: Dockerfile
      target: node
    env_file: .env.local
    # SELinux: api mounts dev/agents + host images/uploads/logs + the librechat-config volume
    # (user_home_t); needs label=disable under rootless Podman (no-op under Docker).
    security_opt:
      - label=disable
    depends_on:
      librechat-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_started
      meilisearch:
        condition: service_started
      mcp-linux:
        condition: service_healthy
      mcp-stackoverflow:
        condition: service_healthy
      mcp-npm-search:
        condition: service_healthy
    networks:
      # app-net first to ensure mcp-linux resolves correctly on isolated app-net
      # (not on shared traefik-net where multiple containers might register mcp-linux)
      - app-net
      - traefik-net
    volumes:
      - ./dev/agents:/app/node_modules/@librechat/agents
    environment:
      NODE_ENV: development
      STACK_NAME: ${STACK_NAME:-local}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=ai-chat-interface_traefik-net"
      - "traefik.http.routers.librechat.rule=Host(`chat.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.librechat.entrypoints=web"
      - "traefik.http.services.librechat.loadbalancer.server.port=3080"

  # Web Search Services
  searxng-config-init:
    extends: { file: docker-compose.websearch.yml, service: searxng-config-init }
    container_name: ${STACK_NAME:-local}-searxng-config-init
    env_file: .env.local

  searxng:
    extends: { file: docker-compose.websearch.yml, service: searxng }
    container_name: ${STACK_NAME:-local}-searxng
    volumes:
      - searxng-config:/etc/searxng:ro
    depends_on:
      searxng-config-init:
        condition: service_completed_successfully
    env_file: .env.local
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=ai-chat-interface_traefik-net"
      - "traefik.http.routers.searxng.rule=Host(`searxng.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.searxng.entrypoints=web"
      - "traefik.http.services.searxng.loadbalancer.server.port=8080"

  firecrawl-api:
    extends: { file: docker-compose.websearch.yml, service: firecrawl-api }
    container_name: ${STACK_NAME:-local}-firecrawl-api
    env_file: .env.local
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=ai-chat-interface_traefik-net"
      - "traefik.http.routers.firecrawl.rule=Host(`firecrawl.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.firecrawl.entrypoints=web"
      - "traefik.http.services.firecrawl.loadbalancer.server.port=3002"

  playwright-service:
    extends: { file: docker-compose.websearch.yml, service: playwright-service }
    container_name: ${STACK_NAME:-local}-firecrawl-playwright
    env_file: .env.local

  redis:
    extends: { file: docker-compose.websearch.yml, service: redis }
    container_name: ${STACK_NAME:-local}-firecrawl-redis
    env_file: .env.local

  nuq-postgres:
    extends: { file: docker-compose.websearch.yml, service: nuq-postgres }
    container_name: ${STACK_NAME:-local}-firecrawl-postgres
    env_file: .env.local

  rabbitmq:
    extends: { file: docker-compose.websearch.yml, service: rabbitmq }
    container_name: ${STACK_NAME:-local}-firecrawl-rabbitmq
    env_file: .env.local

  # RAG Services
  vectordb:
    extends: { file: docker-compose.rag.yml, service: vectordb }
    container_name: ${STACK_NAME:-local}-vectordb
    env_file: .env.local

  rag_api:
    extends: { file: docker-compose.rag.yml, service: rag_api }
    container_name: ${STACK_NAME:-local}-rag-api
    env_file: .env.local

  # YTPTube - video/audio download via yt-dlp (for MCP YTPTube)
  ytptube:
    extends: { file: docker-compose.ytptube.yml, service: ytptube }
    container_name: ${STACK_NAME:-local}-ytptube
    env_file: .env.local
    networks:
      - app-net
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=ai-chat-interface_traefik-net"
      - "traefik.http.routers.ytptube.rule=Host(`ytptube.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.ytptube.entrypoints=web"
      - "traefik.http.services.ytptube.loadbalancer.server.port=8081"

  # MCP Services
  mcp-calculator:
    extends: { file: docker-compose.mcp-calculator.yml, service: mcp-calculator }
    container_name: ${STACK_NAME:-local}-mcp-calculator
    env_file: .env.local
    # Override: use build for local development instead of image from registry
    build:
      context: ./packages/mcp-calculator
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${MCP_CALCULATOR_PORT:-3012}:${MCP_CALCULATOR_PORT:-3012}"  # Cursor IDE – local only
    # No Traefik labels - internal service only

  mcp-wikipedia:
    extends: { file: docker-compose.mcp-wikipedia.yml, service: mcp-wikipedia }
    container_name: ${STACK_NAME:-local}-mcp-wikipedia
    env_file: .env.local
    # Override: use build for local development instead of image from registry
    build:
      context: ./packages/mcp-wikipedia
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${MCP_WIKIPEDIA_PORT:-3017}:${MCP_WIKIPEDIA_PORT:-3017}"  # Cursor IDE – local only
    # No Traefik labels - internal service only

  mcp-image-gen:
    extends: { file: docker-compose.mcp-image-gen.yml, service: mcp-image-gen }
    container_name: ${STACK_NAME:-local}-mcp-image-gen
    env_file: .env.local
    # Override: use build for local development instead of image from registry
    build:
      context: ./packages/mcp-image-gen
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${MCP_IMAGE_GEN_PORT:-3013}:${MCP_IMAGE_GEN_PORT:-3013}"  # Cursor IDE – local only
    # No Traefik labels - internal service only

  mcp-docs:
    extends: { file: docker-compose.mcp-docs.yml, service: mcp-docs }
    container_name: ${STACK_NAME:-local}-mcp-docs
    env_file: .env.local
    image: ghcr.io/faktenforum/mcp-docs:latest
    build:
      context: ./dev/docs-mcp-server
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${MCP_DOCS_PORT:-6280}:6280"  # Cursor IDE – local only

  mcp-openstreetmap:
    extends: { file: docker-compose.mcp-openstreetmap.yml, service: mcp-openstreetmap }
    container_name: ${STACK_NAME:-local}-mcp-openstreetmap
    env_file: .env.local
    # Build from submodule Dockerfile (like rag_api)
    # Use unique image name to avoid layering on top of base image (python:3.13-slim)
    image: ghcr.io/faktenforum/mcp-openstreetmap:latest
    build:
      context: ./dev/open-streetmap-mcp
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3004:3004"  # Cursor IDE – local only
    # No Traefik labels - internal service only

  mcp-weather:
    extends: { file: docker-compose.mcp-weather.yml, service: mcp-weather }
    container_name: ${STACK_NAME:-local}-mcp-weather
    env_file: .env.local
    ports:
      - "127.0.0.1:3005:3005"  # Cursor IDE – local only
    # No Traefik labels - internal service only

  mcp-ytptube:
    extends: { file: docker-compose.mcp-ytptube.yml, service: mcp-ytptube }
    container_name: ${STACK_NAME:-local}-mcp-ytptube
    env_file: .env.local
    build:
      context: ./packages/mcp-ytptube
      dockerfile: Dockerfile
    depends_on:
      ytptube:
        condition: service_started
    ports:
      - "127.0.0.1:3010:3010"  # Cursor IDE – local only
    # No Traefik labels - internal service only

  mcp-db-timetable:
    extends: { file: docker-compose.mcp-db-timetable.yml, service: mcp-db-timetable }
    container_name: ${STACK_NAME:-local}-mcp-db-timetable
    env_file: .env.local
    # Build from submodule Dockerfile
    # Use unique image name to prevent Docker layering built image on base image
    image: ghcr.io/faktenforum/mcp-db-timetable:latest
    build:
      context: ./dev/db-timetable-mcp
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3007:3007"  # Cursor IDE – local only
    # No Traefik labels - internal service only

  mcp-stackoverflow:
    extends: { file: docker-compose.mcp-stackoverflow.yml, service: mcp-stackoverflow }
    container_name: ${STACK_NAME:-local}-mcp-stackoverflow
    env_file: .env.local
    # Build from submodule Dockerfile
    # Use unique image name to prevent Docker layering built image on base image
    image: ghcr.io/faktenforum/mcp-stackoverflow:latest
    build:
      context: ./dev/stackoverflow-mcp
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3008:3008"  # Cursor IDE – local only
    # No Traefik labels - internal service only

  mcp-npm-search:
    extends: { file: docker-compose.mcp-npm-search.yml, service: mcp-npm-search }
    container_name: ${STACK_NAME:-local}-mcp-npm-search
    env_file: .env.local
    # Build from submodule Dockerfile
    # Use unique image name to prevent Docker layering built image on base image
    image: ghcr.io/faktenforum/mcp-npm-search:latest
    build:
      context: ./dev/npm-search-mcp
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3009:3009"  # Cursor IDE – local only
    # No Traefik labels - internal service only

  mcp-chefkoch:
    extends: { file: docker-compose.mcp-chefkoch.yml, service: mcp-chefkoch }
    container_name: ${STACK_NAME:-local}-mcp-chefkoch
    env_file: .env.local
    build:
      context: ./packages/mcp-chefkoch
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${MCP_CHEFKOCH_PORT:-3014}:${MCP_CHEFKOCH_PORT:-3014}"  # Cursor IDE – local only
    # No Traefik labels - internal service only

  mcp-linux:
    extends: { file: docker-compose.mcp-linux.yml, service: mcp-linux }
    container_name: ${STACK_NAME:-local}-mcp-linux
    env_file: .env.local
    build:
      context: ./packages/mcp-linux
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${MCP_LINUX_PORT:-3015}:${MCP_LINUX_PORT:-3015}"  # Cursor IDE – local only
    volumes:
      # Mount source so code changes apply after restart (no image rebuild).
      - ./packages/mcp-linux/src:/app/src
    networks:
      - app-net
      - traefik-net
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=ai-chat-interface_traefik-net"
      - "traefik.http.routers.mcp-linux-upload.rule=Host(`mcp-linux.${DOMAIN:-localhost}`) && PathPrefix(`/upload`)"
      - "traefik.http.routers.mcp-linux-upload.entrypoints=web"
      - "traefik.http.routers.mcp-linux-upload.service=mcp-linux"
      - "traefik.http.routers.mcp-linux-upload.priority=10"
      - "traefik.http.routers.mcp-linux-download.rule=Host(`mcp-linux.${DOMAIN:-localhost}`) && PathPrefix(`/download`)"
      - "traefik.http.routers.mcp-linux-download.entrypoints=web"
      - "traefik.http.routers.mcp-linux-download.service=mcp-linux"
      - "traefik.http.routers.mcp-linux-download.priority=10"
      - "traefik.http.services.mcp-linux.loadbalancer.server.port=3015"

  # Additional Services
  spend-monitor:
    extends: { file: docker-compose.spend-monitor.yml, service: spend-monitor }
    container_name: ${STACK_NAME:-local}-spend-monitor
    env_file: .env.local
    # Override: build locally instead of pulling from registry
    build:
      context: ./packages/spend-monitor
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:${SPEND_MONITOR_PORT:-3016}:3016"
    # Local only: localhost-bound + spend.localhost. No auth needed on a dev machine.
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=ai-chat-interface_traefik-net"
      - "traefik.http.routers.spend-monitor.rule=Host(`spend.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.spend-monitor.entrypoints=web"
      - "traefik.http.services.spend-monitor.loadbalancer.server.port=3016"

networks:
  app-net:
    driver: bridge
  firecrawl-network:
    driver: bridge
  traefik-net:
    driver: bridge

volumes:
  docs-mcp-data:
  docs-mcp-config:
  firecrawl_pgdata:
  firecrawl_rabbitmq_data:
  librechat-config:
  mongodata:
  mongoconfig:
  pgdata2:
  searxng-config:
  ytptube_config:
  ytptube_downloads:
  mcp_linux_homes:
  mcp_linux_data: